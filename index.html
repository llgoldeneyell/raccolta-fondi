<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8" />
  <title>Raccolta Armadietti</title>
  <style>
    body {
      font-family: system-ui, Arial;
      background: linear-gradient(135deg, #eef2f7, #dfe7f1);
      margin: 0;
      padding: 40px 20px;
      text-align: center;
      color: #1f2937;
    }
    
    .card {
      background: white;
      padding: 30px;
      border-radius: 16px;
      max-width: 650px;
      margin: auto;
      box-shadow: 0 10px 30px rgba(0,0,0,0.08);
    }
    
    /* TITOLI */
    .card h1 {
      margin: 0 0 10px 0;
      font-size: 28px;
    }
    
    .card h2 {
      margin: 8px 0;
      font-weight: 500;
    }
    
    /* PROGRESS BAR */
    .progress {
      height: 28px;
      background: #e5e7eb;
      border-radius: 999px;
      overflow: hidden;
      margin: 25px 0;
    }
    
    .bar {
      height: 100%;
      width: 0%;
      background: linear-gradient(90deg, #22c55e, #16a34a);
      transition: width 0.6s ease;
      border-radius: 999px;
    }
    
    /* LISTE */
    ol, ul {
      text-align: left;
      max-width: 400px;
      margin: 10px auto;
      padding-left: 20px;
    }
    
    li {
      padding: 6px 0;
    }
  </style>
</head>
<body>

<div class="card">
  <h1>Raccolta Armadietti</h1>

  <h2>Obiettivo: € <span id="goal">...</span></h2>
  <h2>Raccolto: € <span id="raised">...</span></h2>

  <div class="progress">
    <div class="bar" id="bar"></div>
  </div>

  <h3>Top Donatori</h3>
  <ol id="top"></ol>

  <h3>Tutti i donatori</h3>
  <ul id="all"></ul>
</div>

<script src="app.js"></script>

</body>
</html>
