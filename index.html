<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8" />
  <title>Raccolta Armadietti</title>
  <style>
    body {
      font-family: system-ui, -apple-system, Segoe UI, Roboto, Arial;
      background: linear-gradient(135deg, #eef2f7, #dbe7f5);
      margin: 0;
      padding: 40px 16px;
      color: #111827;
    }
    
    .card {
      background: white;
      padding: 28px;
      border-radius: 18px;
      max-width: 700px;
      margin: auto;
      box-shadow: 0 12px 40px rgba(0,0,0,0.10);
    }
    
    /* HEADER */
    .card h1 {
      font-size: 30px;
      margin: 0 0 10px 0;
      letter-spacing: -0.5px;
    }
    
    .card h2 {
      margin: 6px 0;
      font-weight: 500;
      color: #374151;
    }
    
    /* NUMERI IMPORTANTI */
    #raised {
      font-size: 28px;
      font-weight: 700;
      color: #16a34a;
    }
    
    #goal {
      font-weight: 700;
    }
    
    /* PROGRESS */
    .progress {
      height: 30px;
      background: #e5e7eb;
      border-radius: 999px;
      overflow: hidden;
      margin: 24px 0;
      position: relative;
    }
    
    .bar {
      height: 100%;
      width: 0%;
      background: linear-gradient(90deg, #22c55e, #16a34a);
      transition: width 0.7s ease;
      border-radius: 999px;
    }
    
    /* TITOLI SEZIONI */
    h3 {
      margin-top: 28px;
      margin-bottom: 10px;
      font-size: 18px;
      color: #111827;
    }
    
    /* TOP DONATORI */
    ol {
      list-style: none;
      padding: 0;
      margin: 0 auto;
      max-width: 420px;
    }
    
    ol li {
      background: #f3f4f6;
      margin: 8px 0;
      padding: 10px 14px;
      border-radius: 10px;
      display: flex;
      justify-content: space-between;
      font-weight: 500;
    }
    
    /* CLASSIFICA COMPLETA */
    ul {
      list-style: none;
      padding: 0;
      margin: 0 auto;
      max-width: 420px;
    }
    
    ul li {
      padding: 8px 10px;
      border-bottom: 1px solid #eee;
    }
    
    /* EFFETTO HOVER */
    ol li:hover, ul li:hover {
      background: #eaf5ee;
    }
  </style>
</head>
<body>

<div class="card">
  <h1>Raccolta Armadietti</h1>

  <h2>Obiettivo: € <span id="goal">...</span></h2>
  <h2>Raccolto: € <span id="raised">...</span></h2>

  <div class="progress">
    <div class="bar" id="bar"></div>
  </div>

  <h3>Top Donatori</h3>
  <ol id="top"></ol>

  <h3>Tutti i donatori</h3>
  <ul id="all"></ul>
</div>

<script src="app.js"></script>

</body>
</html>
