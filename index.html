<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8" />
  <title>Raccolta Armadietti</title>
  <style>
    body {
      font-family: system-ui, -apple-system, Segoe UI, Roboto, Arial;
      background: radial-gradient(circle at top, #eaf2ff, #dfe9f7);
      margin: 0;
      padding: 40px 16px;
      color: #0f172a;
    }
    
    /* CONTAINER PRINCIPALE */
    .card {
      background: white;
      padding: 32px;
      border-radius: 22px;
      max-width: 780px;
      margin: auto;
      box-shadow: 0 20px 60px rgba(0,0,0,0.12);
      border: 1px solid rgba(0,0,0,0.05);
    }
    
    /* TITOLO */
    .card h1 {
      font-size: 34px;
      margin: 0 0 6px 0;
      letter-spacing: -0.8px;
    }
    
    .subtitle {
      color: #64748b;
      margin-bottom: 20px;
    }
    
    /* GRID KPI */
    .kpi {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 14px;
      margin: 20px 0;
    }
    
    .kpi-box {
      background: #f8fafc;
      padding: 16px;
      border-radius: 14px;
      text-align: left;
      border: 1px solid #e5e7eb;
    }
    
    .kpi-label {
      font-size: 12px;
      color: #64748b;
    }
    
    .kpi-value {
      font-size: 24px;
      font-weight: 700;
      margin-top: 6px;
    }
    
    /* PROGRESS BAR */
    .progress {
      height: 34px;
      background: #e2e8f0;
      border-radius: 999px;
      overflow: hidden;
      margin: 26px 0 10px 0;
    }
    
    .bar {
      height: 100%;
      width: 0%;
      background: linear-gradient(90deg, #22c55e, #16a34a);
      transition: width 0.8s ease;
      border-radius: 999px;
    }
    
    /* PERCENTUALE */
    .percent {
      text-align: right;
      font-size: 13px;
      color: #64748b;
      margin-bottom: 20px;
    }
    
    /* TOP DONATORI */
    .top {
      display: grid;
      gap: 10px;
      margin-top: 10px;
    }
    
    .top-item {
      display: flex;
      justify-content: space-between;
      padding: 12px 14px;
      background: #f1f5f9;
      border-radius: 12px;
      font-weight: 500;
    }
    
    /* MEDAGLIE */
    .badge {
      font-size: 14px;
      margin-right: 8px;
    }
    
    .gold { color: #fbbf24; }
    .silver { color: #94a3b8; }
    .bronze { color: #b45309; }
    
    /* LISTA */
    ul {
      list-style: none;
      padding: 0;
      margin-top: 10px;
    }
    
    ul li {
      padding: 8px 10px;
      border-bottom: 1px solid #eef2f7;
      color: #334155;
    }
    
    /* HOVER */
    .top-item:hover {
      background: #e2e8f0;
    }
  </style>
</head>
<body>

<div class="card">
  <h1>Raccolta Armadietti</h1>
  
  <div class="kpi">
    <div class="kpi-box">
      <div class="kpi-label">Obiettivo</div>
      <div class="kpi-value">€ <span id="goal">0</span></div>
    </div>
  
    <div class="kpi-box">
      <div class="kpi-label">Raccolto</div>
      <div class="kpi-value" style="color:#16a34a;">€ <span id="raised">0</span></div>
    </div>
  </div>

  <div class="progress">
    <div class="bar" id="bar"></div>
    <div class="percent" id="percent">0%</div>
  </div>

  <h3>Top Donatori</h3>
  <ol id="top"></ol>

  <h3>Tutti i donatori</h3>
  <ul id="all"></ul>
</div>

<script src="app.js"></script>

</body>
</html>
