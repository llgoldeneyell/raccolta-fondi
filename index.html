<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8" />
  <title>Raccolta Armadietti</title>
  <style>
    body {
      font-family: Arial;
      background: #f5f5f5;
      margin: 0;
      padding: 20px;
      text-align: center;
    }
    .card {
      background: white;
      padding: 20px;
      border-radius: 10px;
      max-width: 600px;
      margin: auto;
      box-shadow: 0 2px 8px rgba(0,0,0,0.1);
    }
    .progress {
      height: 20px;
      background: #ddd;
      border-radius: 10px;
      overflow: hidden;
      margin: 20px 0;
    }
    .bar {
      height: 100%;
      width: 0%;
      background: green;
      transition: width 0.5s;
    }
  </style>
</head>
<body>

<div class="card">
  <h1>Raccolta Armadietti</h1>

  <h2>Obiettivo: € <span id="goal">...</span></h2>
  <h2>Raccolto: € <span id="raised">...</span></h2>

  <div class="progress">
    <div class="bar" id="bar"></div>
  </div>

  <h3>Top Donatori</h3>
  <ol id="top"></ol>

  <h3>Tutti i donatori</h3>
  <ul id="all"></ul>
</div>

<script src="app.js"></script>

</body>
</html>
